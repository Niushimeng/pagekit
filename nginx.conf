server {
    listen 80;
    server_name _;

    # Docker 端口映射（如 13080:80）时，目录补斜杠等重定向用相对路径，保留外部端口
    absolute_redirect off;

    # 已发布静态站点：/data/sites/<服务名>/...
    location / {
        root /data/sites;

        # 有 index.html 则优先返回；没有则显示目录列表
        # 注意：不可使用 try_files，否则目录无 index 时会直接 404，autoindex 不会生效
        index index.html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Proxy API to Pagekit backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
