version: '3.8'

services:
  pagekit:
    build: .
    container_name: pagekit
    restart: unless-stopped
    ports:
      - "80:80"       # Nginx：已发布静态站点
      - "3000:3000"   # 管理后台
    volumes:
      - ./config.json:/app/config.json:ro
      - pagekit-data:/data

volumes:
  pagekit-data:
  sites-data:
